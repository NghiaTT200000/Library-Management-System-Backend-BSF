server:
  port: 8080

spring:
  application:
    name: library_management_artifact
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=library_db;encrypt=false;trustServerCertificate=true}
    username: ${DB_USERNAME:sa1}
    password: ${DB_PASSWORD:password123}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}     
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  rag:
    top-k: 5
  fine:
    rate-per-day: 0.50
    max-amount: 10.00
    grace-period-days: 2
    loan-period-days: 14
