server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: library_management_artifact
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=library_db;encrypt=false;trustServerCertificate=true}
    username: ${DB_USERNAME:sa1}
    password: ${DB_PASSWORD:password123}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  email-verification:
    expiry-minutes: 30
  base-url: ${BASE_URL:http://localhost:8080}
  rag:
    top-k: 5
  fine:
    rate-per-day: 5000
    max-amount: 100000
    grace-period-days: 2
    loan-period-days: 14
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}
    upload-folder: library/covers
  swagger:
    title: Library Management API
    version: 1.0.0
    description: Library Management System REST API
